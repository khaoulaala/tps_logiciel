services:
  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app1:
    build: ./app
    container_name: app1
    environment:
      PORT: 3001
      INSTANCE: Instance-1
      MONGODB_URI: mongodb://mongodb:27017/boutique
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL: 30
      RABBITMQ_URI: amqp://admin:admin@rabbitmq:5672
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  app2:
    build: ./app
    container_name: app2
    environment:
      PORT: 3002
      INSTANCE: Instance-2
      MONGODB_URI: mongodb://mongodb:27017/boutique
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL: 30
      RABBITMQ_URI: amqp://admin:admin@rabbitmq:5672
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  consumer:
    build: ./app
    container_name: consumer
    command: npm run consumer
    environment:
      MONGODB_URI: mongodb://mongodb:27017/boutique
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URI: amqp://admin:admin@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
